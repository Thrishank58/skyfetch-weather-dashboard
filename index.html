<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#8e2de2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyFetch Pro</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-container">

    <div class="top-bar">
        <h1>SkyFetch Pro 🌦️</h1>
        <button id="themeToggle">🌙</button>
    </div>

    <div class="search-container">
        <input type="text" id="cityInput" placeholder="Enter city name">
        <button id="searchBtn">Search</button>
    </div>

    <div id="loading" class="loader"></div>

    <div class="weather-container">
        <h2 id="city">Loading...</h2>
        <img id="weather-icon">
        <p id="temperature"></p>
        <button id="unitToggle">Switch °F</button>

        <div class="extra-details">
            <p id="feelsLike"></p>
            <p id="humidity"></p>
            <p id="wind"></p>
            <p id="uv"></p>
        </div>

        <p id="description"></p>
    </div>

    <h3>Hourly Forecast</h3>
    <div id="hourly-container" class="hourly-container"></div>

    <h3>Temperature Trend</h3>
    <canvas id="tempChart"></canvas>

    <div id="forecast-container" class="forecast-container"></div>

</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
